 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
   <defs>
     <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
       <stop offset="0%" stop-color="#165dff"/>
       <stop offset="100%" stop-color="#0e42d2"/>
     </linearGradient>
   </defs>
   <rect width="512" height="512" rx="100" fill="url(#bg)"/>
   <!-- Candlestick chart -->
   <g stroke-linecap="round" stroke-linejoin="round">
     <!-- Bar 1 (green/up) -->
     <rect x="120" y="280" width="40" height="100" rx="4" fill="#00b42a"/>
     <rect x="135" y="260" width="10" height="120" rx="3" fill="#00b42a"/>
     <!-- Bar 2 (green/up) -->
     <rect x="190" y="200" width="40" height="130" rx="4" fill="#00b42a"/>
     <rect x="205" y="180" width="10" height="150" rx="3" fill="#00b42a"/>
     <!-- Bar 3 (red/down) -->
     <rect x="260" y="240" width="40" height="100" rx="4" fill="#f53f3f"/>
     <rect x="275" y="230" width="10" height="120" rx="3" fill="#f53f3f"/>
     <!-- Bar 4 (green/up) -->
     <rect x="330" y="170" width="40" height="140" rx="4" fill="#00b42a"/>
     <rect x="345" y="150" width="10" height="160" rx="3" fill="#00b42a"/>
   </g>
   <!-- Trend line -->
   <polyline points="140,290 210,210 280,270 350,180"
             fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.7" stroke-linecap="round"/>
   <!-- Check mark -->
   <circle cx="410" cy="130" r="45" fill="#00b42a" opacity="0.9"/>
   <path d="M395 130 l12 14 l22-28" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
 </svg>
